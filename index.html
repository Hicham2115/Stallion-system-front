<!DOCTYPE html>
<html lang="en" class="h-full dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/unicorn.png" />
    <link rel="apple-touch-icon" href="/unicorn.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f59e0b" />

    <!-- Primary SEO -->
    <title>Stallion Advertising — Agency Management Platform</title>
    <meta name="description" content="Stallion Advertising is a full-featured agency management platform. Manage clients, campaigns, leads, finances, and your team — all in one place." />
    <meta name="keywords" content="advertising agency, agency management, client management, campaign tracking, CRM, leads, invoicing, team management" />
    <meta name="author" content="Stallion Advertising" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://stallion-system-front.vercel.app/" />
 
    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stallion-system-front.vercel.app/" />
    <meta property="og:title" content="Stallion Advertising — Agency Management Platform" />
    <meta property="og:description" content="Full-featured agency management platform. Manage clients, campaigns, leads, finances, and your team — all in one place." />
    <meta property="og:image" content="https://stallion-system-front.vercel.app/images/dashboard-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Stallion Advertising" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Stallion Advertising — Agency Management Platform" />
    <meta name="twitter:description" content="Full-featured agency management platform. Manage clients, campaigns, leads, finances, and your team." />
    <meta name="twitter:image" content="https://stallion-system-front.vercel.app/images/dashboard-preview.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="h-full bg-slate-50 dark:bg-stallion-dark font-sans antialiased">
    <script>
      (function() {
        var t = localStorage.getItem('stallion_theme') || 'dark';
        if (t === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      })();
    </script>
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
